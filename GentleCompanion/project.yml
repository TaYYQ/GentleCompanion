name: GentleCompanion
options:
  bundleIdPrefix: com.GentleCompanion
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"

targets:
  GentleCompanion:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - .build
          - .git
          - "*.xcodeproj"
          - "*.xcworkspace"
          - Packages
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.GentleCompanion
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: GentleCompanion.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: GentleCompanion.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.GentleCompanion